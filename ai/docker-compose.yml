services:
  ai:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda-b4719
    container_name: ai-server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: >
      -m /models/gemma-2-2b-it-q4_k_m.gguf
      --host 0.0.0.0
      --port 8080
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]