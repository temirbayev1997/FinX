services:
  ai:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda-b4719
    container_name: ai-server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: >
      -m /models/Meta-Llama-3-8B-Instruct.Q4_K_M.gguf
      -c 4096
      -ngl 35
      --host 0.0.0.0
      --port 8080
      --temp 0.3
      --top-p 0.9
      --repeat-penalty 1.1
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]